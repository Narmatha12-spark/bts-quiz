<!DOCTYPE html>
<html>
<head>
  <title>BTS Quiz 💜</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(135deg, #1a001f, #4b0082);
      color: white;
    }

    h1 {
      margin-top: 20px;
    }

    .container {
      margin-top: 30px;
    }

    button {
      margin: 8px;
      padding: 10px 20px;
      border: none;
      background: purple;
      color: white;
      cursor: pointer;
      border-radius: 10px;
    }

    button:hover {
      background: #ff66cc;
    }

    #gameArea {
      margin-top: 20px;
    }

    input {
      padding: 8px;
      border-radius: 8px;
      border: none;
    }
  </style>
</head>
<body>

  <h1>💜 BTS Quiz & Mini Games 💜</h1>

  <div class="container">
    <button onclick="startQuiz()">🧠 Quiz</button>
    <button onclick="startEmoji()">🎯 Emoji Game</button>
    <button onclick="startSongFinder()">🎵 Song Finder</button>
  </div>

  <div id="gameArea"></div>

  <script>
    let score = 0;
    let index = 0;

    const quizData = [
      {
        question: "Who is the leader of BTS?",
        options: ["RM", "Jungkook", "V", "Jimin"],
        answer: "RM"
      },
      {
        question: "Which song says 'Smooth like butter'?",
        options: ["Butter", "Dynamite", "DNA", "Fire"],
        answer: "Butter"
      }
    ];

    const emojiGame = [
      { emoji: "🔥💣", answer: "Fire" },
      { emoji: "🧬", answer: "DNA" }
    ];

    const songFinder = [
      { lyric: "smooth like butter", song: "Butter" },
      { lyric: "light it up like dynamite", song: "Dynamite" }
    ];

    function startQuiz() {
      index = 0;
      score = 0;
      loadQuiz();
    }

    function loadQuiz() {
      if (index >= quizData.length) {
        showResult();
        return;
      }

      let q = quizData[index];
      let html = `<h2>${q.question}</h2>`;

      q.options.forEach(opt => {
        html += `<button onclick="checkAnswer('${opt}')">${opt}</button>`;
      });

      document.getElementById("gameArea").innerHTML = html;
    }

    function checkAnswer(ans) {
      if (ans === quizData[index].answer) {
        alert("💜 Correct!");
        score++;
      } else {
        alert("❌ Wrong!");
      }
      index++;
      loadQuiz();
    }

    function showResult() {
      let rank = "Newbie";
      if (score === quizData.length) rank = "BTS Expert";
      else if (score > 0) rank = "True ARMY";

      document.getElementById("gameArea").innerHTML =
        `<h2>Score: ${score}</h2><h3>Rank: ${rank} 💜</h3>`;
    }

    // Emoji Game
    function startEmoji() {
      index = 0;
      loadEmoji();
    }

    function loadEmoji() {
      if (index >= emojiGame.length) {
        document.getElementById("gameArea").innerHTML = "<h2>🎉 Done!</h2>";
        return;
      }

      let e = emojiGame[index];
      document.getElementById("gameArea").innerHTML =
        `<h2>${e.emoji}</h2>
         <input id="emojiAns" placeholder="Guess song">
         <br><br>
         <button onclick="checkEmoji()">Submit</button>`;
    }

    function checkEmoji() {
      let val = document.getElementById("emojiAns").value;
      if (val.toLowerCase() === emojiGame[index].answer.toLowerCase()) {
        alert("💜 Correct!");
      } else {
        alert("❌ Wrong! Answer: " + emojiGame[index].answer);
      }
      index++;
      loadEmoji();
    }

    // Song Finder
    function startSongFinder() {
      document.getElementById("gameArea").innerHTML =
        `<h2>🎵 Type BTS lyric</h2>
         <input id="lyricInput" placeholder="Enter lyric">
         <br><br>
         <button onclick="findSong()">Find</button>
         <h3 id="result"></h3>`;
    }

    function findSong() {
      let input = document.getElementById("lyricInput").value.toLowerCase();
      let found = "Not found 😢";

      songFinder.forEach(item => {
        if (input.includes(item.lyric)) {
          found = item.song;
        }
      });

      document.getElementById("result").innerText = "Song: " + found;
    }
  </script>

</body>
</html>
